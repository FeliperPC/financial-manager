<div class="actions">
  <app-search class="search" [(search)]="search"></app-search>
  <a matButton="filled" routerLink="create/new" class="btn">New Transaction</a>
</div>

@if (isLoading()) {
  <mat-progress-bar mode="indeterminate"></mat-progress-bar>
} @else {
  <div class="transactions">
    @for (transaction of transactions(); track $index) {
      <app-transaction-item
        class="transaction"
        [transaction]="transaction"
        (edit)="edit($event)"
        (remove)="remove($event)"
      ></app-transaction-item>
    } @empty {
      <app-no-transaction></app-no-transaction>
    }
  </div>
}
