<app-balance [transactions]="list()"></app-balance>

<div class="actions">
  <a matButton="filled" routerLink="create/new">New Transaction</a>
</div>

<div class="transactions">
  @for (transaction of list(); track $index) {
    <app-transaction-item
      class="transaction"
      [transaction]="transaction"
      (edit)="edit($event)"
      (remove)="remove($event)"
    ></app-transaction-item>
  } @empty {
    <app-no-transaction></app-no-transaction>
  }
</div>
