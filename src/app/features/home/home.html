<app-balance [transactions]="transactions()"></app-balance>

<div class="actions">
  <a matButton="filled" routerLink="create">New Transaction</a>
</div>

<div class="transactions">
  @for (transaction of transactions(); track $index) {
    <app-transaction-item
      class="transaction"
      [transaction]="transaction"
      (edit)="edit($event)"
    ></app-transaction-item>
  } @empty {
    <app-no-transaction></app-no-transaction>
  }
</div>
