<form [formGroup]="form()" (ngSubmit)="submit()">
  <div class="mb-24">
    <mat-button-toggle-group formControlName="type">
      <mat-button-toggle [value]="transactionType.OUTCOME">Outcome</mat-button-toggle>
      <mat-button-toggle [value]="transactionType.INCOME">Income</mat-button-toggle>
    </mat-button-toggle-group>
    @if (form().controls.type.invalid) {
      <mat-error>Type is required</mat-error>
    }
  </div>
  <mat-form-field class="w-100 mb-24">
    <mat-label>Title</mat-label>
    <input matInput placeholder="Gaz payment" formControlName="title" required />
    @if (form().controls.title.invalid) {
      <mat-error>Title is required</mat-error>
    }
  </mat-form-field>
  <mat-form-field class="w-100 mb-24">
    <mat-label>Value</mat-label>
    <span matTextPrefix>$ &nbsp;</span>
    <input mask="separator.2" matInput placeholder="13.90" formControlName="value" required />
    @if (form().controls.title.invalid) {
      <mat-error>Value is required</mat-error>
    }
  </mat-form-field>
  <div class="submit-container">
    <button matButton="filled" type="submit" [disabled]="form().invalid">Save</button>
  </div>
</form>
