<mat-card class="card">
  <div>
    <div class="card-title">{{ transaction().title }}</div>
    <div class="card-value">
      <app-transaction-value [transaction]="transaction()" />
    </div>
  </div>
  <div class="card-actions">
    <button matButton="filled" matButtonColor="error" (click)="remove.emit(transaction())">
      Remove
    </button>
    <button matButton="filled" (click)="edit.emit(transaction())">Edit</button>
  </div>
</mat-card>
