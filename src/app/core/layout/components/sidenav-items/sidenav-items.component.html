<mat-nav-list>
  @for (link of links(); track link) {
    <a
      mat-list-item
      [routerLink]="link.url"
      routerLinkActive="mdc-list-item--activated"
      [routerLinkActiveOptions]="{ exact: true }"
      >{{ link.label }}</a
    >
  }
</mat-nav-list>
<mat-action-list>
  @if (isLoggedIn()) {
    <button mat-list-item appLogout>Log out</button>
  }
</mat-action-list>
